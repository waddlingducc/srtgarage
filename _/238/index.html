<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;width:100%;overflow:hidden;background:#000;color:#fff;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
  body{
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(252,3,3,0.22) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 90% 90%, rgba(252,3,3,0.14) 0%, transparent 55%),

  }
  img{-webkit-user-drag:none;user-select:none}
  .kiwi-nav{
    position:fixed;top:0;left:0;right:0;height:44px;z-index:10000;

    padding:0 16px;
    background:rgba(18,8,10,0.82);
    backdrop-filter:blur(18px) saturate(1.4);
    -webkit-backdrop-filter:blur(18px) saturate(1.4);
    border-bottom:1px solid rgba(252,3,3,0.6);
  }
  .kiwi-nav-left{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff;transition:transform .2s ease}
  .kiwi-nav-left:hover{transform:translateY(-1px)}
  .kiwi-nav-left img{height:30px;width:30px;border-radius:6px;object-fit:contain;filter:drop-shadow(0 0 4px rgba(252,3,3,0.75))}
  .kiwi-brand{font-weight:700;font-size:20px;color:#fc0303;letter-spacing:-0.5px}
  .kiwi-game-title{
    position:absolute;left:50%;transform:translateX(-50%);
    font-size:14px;font-weight:500;color:rgba(255,255,255,0.9);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:46%;
    letter-spacing:0.3px
  }
  .kiwi-stage{
    position:fixed;top:54px;left:10px;right:320px;bottom:110px;
    padding:0;
  }
  .kiwi-frame-wrap{
    width:100%;height:100%;border-radius:12px;overflow:hidden;
    background:#0f0a0a;
    border:1px solid rgba(252,3,3,0.6);
    box-shadow:0 4px 30px rgba(0,0,0,0.5),0 0 24px rgba(252,3,3,0.20);
    position:relative
  }
  .kiwi-frame-wrap iframe{
    position:absolute;top:0;left:0;width:100%;height:100%;border:0;display:block;
    opacity:0;transition:opacity 0.6s ease
  }
  .kiwi-frame-wrap iframe.loaded{opacity:1}
  .kiwi-loading{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:#ffe0e6;font-family:'Inter',sans-serif;pointer-events:none;
    background:
      radial-gradient(ellipse 70% 65% at 50% 45%, rgba(252,3,3,0.8) 0%, rgba(252,3,3,0.20) 38%, transparent 75%),
      radial-gradient(ellipse at center, #240a10 0%, #15060a 60%, #080206 100%);
    transition:opacity 0.6s ease;z-index:1;overflow:hidden
  }
  .kiwi-loading.hide{opacity:0}
  .kiwi-loading::before{
    content:"";position:absolute;inset:0;
    background-image:
      radial-gradient(1.4px 1.4px at 23px 78px, rgba(180,255,160,0.85), transparent),
      radial-gradient(1px 1px at 67px 23px, rgba(252,3,3,0.6), transparent),
      radial-gradient(1.8px 1.8px at 145px 130px, rgba(200,255,180,0.75), transparent),
      radial-gradient(1px 1px at 200px 50px, rgba(252,3,3,0.55), transparent),
      radial-gradient(1.2px 1.2px at 310px 175px, rgba(180,255,160,0.7), transparent),
      radial-gradient(1px 1px at 50px 220px, rgba(252,3,3,0.55), transparent),
      radial-gradient(2px 2px at 380px 90px, rgba(252,3,3,0.7), transparent),
      radial-gradient(1px 1px at 250px 300px, rgba(180,255,160,0.55), transparent),
      radial-gradient(1.5px 1.5px at 100px 360px, rgba(252,3,3,0.6), transparent),
      radial-gradient(1px 1px at 420px 250px, rgba(180,255,160,0.6), transparent),
      radial-gradient(1.2px 1.2px at 360px 380px, rgba(252,3,3,0.55), transparent),
      radial-gradient(1px 1px at 460px 30px, rgba(180,255,160,0.5), transparent);
    background-size:480px 400px;background-repeat:repeat;
    animation:kiwiTwinkle 5s ease-in-out infinite;
    opacity:0.95;
  }
  .kiwi-loader-stack{position:relative;display:flex;flex-direction:column;align-items:center;z-index:2}
  .kiwi-logo-wrap{
    position:relative;display:flex;align-items:center;justify-content:center;
    margin-bottom:22px;
  }
  .kiwi-logo-wrap img{
    width:72px;height:72px;border-radius:14px;object-fit:contain;
    animation:kiwiPulse 2.4s ease-in-out infinite;
    filter:drop-shadow(0 0 18px rgba(252,3,3,0.55));
  }
  .kiwi-loading-sub{
    font-size:13px;font-weight:500;letter-spacing:0.3px;
    color:rgba(252,3,3,0.85);margin-bottom:18px;
  }
  .kiwi-progress{
    width:240px;max-width:60vw;height:3px;border-radius:3px;
    background:rgba(252,3,3,0.12);overflow:hidden;position:relative;
  }
  .kiwi-progress::after{
    content:"";position:absolute;top:0;left:-40%;width:40%;height:100%;
    background:linear-gradient(90deg, transparent, #fc0303, transparent);
    box-shadow:0 0 12px rgba(252,3,3,0.7);
    animation:kiwiProgress 1.6s cubic-bezier(.6,0,.4,1) infinite;
  }
  @keyframes kiwiPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  @keyframes kiwiProgress{0%{left:-40%}100%{left:100%}}
  @keyframes kiwiTwinkle{0%,100%{opacity:0.95}50%{opacity:0.55}}
  .right-ad-container{
    position:fixed;right:10px;top:54px;width:300px;height:250px;z-index:9999;
    background:rgba(18,8,10,0.82);
    backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);
    border:1px solid rgba(252,3,3,0.85);box-shadow:0 0 18px rgba(252,3,3,0.55),0 0 4px rgba(255,80,80,0.35) inset;
    border-radius:0;
    box-shadow:0 4px 20px rgba(0,0,0,0.5);
    display:flex;align-items:center;justify-content:center;overflow:hidden
  }
  .right-unblocker-container{
    position:fixed;right:10px;top:314px;width:300px;height:250px;z-index:9999;
    background:rgba(18,8,10,0.82);
    backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);
    border:1px solid rgba(252,3,3,0.85);box-shadow:0 0 18px rgba(252,3,3,0.55),0 0 4px rgba(255,80,80,0.35) inset;
    border-radius:0;
    box-shadow:0 4px 20px rgba(0,0,0,0.5);overflow:hidden
  }
  .right-unblocker-container iframe{position:absolute;top:0;left:0;width:1024px;height:768px;border:none}
  .bottom-ad-container{
    position:fixed;left:min(calc(50% - 640px), calc(100% - 1290px));bottom:10px;
    width:970px;height:90px;z-index:9999;
    background:rgba(18,8,10,0.82);
    backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);
    border:1px solid rgba(252,3,3,0.85);box-shadow:0 0 18px rgba(252,3,3,0.55),0 0 4px rgba(255,80,80,0.35) inset;
    border-radius:0;
    display:flex;align-items:center;justify-content:center;overflow:hidden
  }
  .bottom-ad-container > div{width:970px;height:90px;position:relative;overflow:hidden}
  @media (max-width:900px){
    .right-ad-container,.right-unblocker-container,.bottom-ad-container{display:none}
    .kiwi-stage{right:0;bottom:0}
  }
  @media (max-width:600px){
    .kiwi-brand{display:none}
    .kiwi-game-title{max-width:60%}
  }
</style>

<script>
document.addEventListener("contextmenu",function(e){e.preventDefault();});
(function(){
  var f=document.getElementById("kiwiGame");
  var l=document.getElementById("kiwiLoading");
  if(!f)return;
  var minShow=2800, started=Date.now(), done=false;
  function hide(){
    if(done) return; done=true;
    var elapsed=Date.now()-started;
    var wait=Math.max(0, minShow-elapsed);
    setTimeout(function(){
      f.classList.add("loaded");
      if(l){l.classList.add("hide");setTimeout(function(){l.remove();},700);}
    },wait);
  }
  setTimeout(function(){
    f.src=f.getAttribute("data-src");
    f.addEventListener("load",hide);
    setTimeout(hide,15000);
  },150);
})();
</script>
