<script nonce="KA1eZH6AAF8sVJT2PFen-g">
/*kiwi-ytgame-shim*/(function(){
  try {
    if (!window.ytgame) window.ytgame = {};
    if (!ytgame.game) ytgame.game = {};
    if (!ytgame.health) ytgame.health = {};
    if (!ytgame.engagement) ytgame.engagement = {};
    if (!ytgame.system) ytgame.system = {};
    if (!ytgame.ads) ytgame.ads = {};
    var KEY = 'kiwi:ytgame:bouncemasters';
    ytgame.game.saveData = function(s){
      try { localStorage.setItem(KEY, String(s)); } catch(e){}
      return Promise.resolve();
    };
    ytgame.game.loadData = function(){
      var v = '';
      try { v = localStorage.getItem(KEY) || ''; } catch(e){}
      return Promise.resolve(v);
    };
    ytgame.game.gameReady = function(){};
    ytgame.game.firstFrameReady = function(){};
    ytgame.health.logError = function(){};
    ytgame.engagement.sendScore = function(){ return Promise.resolve(); };
    if (typeof ytgame.system.onPause !== 'function') ytgame.system.onPause = function(){};
    if (typeof ytgame.system.onResume !== 'function') ytgame.system.onResume = function(){};
    if (typeof ytgame.system.onAudioEnabledChange !== 'function') ytgame.system.onAudioEnabledChange = function(){};
    if (typeof ytgame.system.isAudioEnabled !== 'function') ytgame.system.isAudioEnabled = function(){ return true; };
    if (typeof ytgame.system.getLanguage !== 'function') ytgame.system.getLanguage = function(){ return (navigator.language || 'en').slice(0,2); };
  } catch(e){}
})();
</script>
<script src="/storage/bouncemasters/game.js" nonce="KA1eZH6AAF8sVJT2PFen-g"></script>
<script nonce="KA1eZH6AAF8sVJT2PFen-g">window.addEventListener("load", () => window.runGame());</script>
</head>


<body>
    <div id="game"></div>
</body>
