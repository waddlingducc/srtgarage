        var GLEN = GLYPHS.length;

          return {
            y: fromTop ? -Math.random()*innerHeight : -Math.random()*innerHeight*0.4,
            speed: 2 + Math.random()*5,
            len: 10 + Math.floor(Math.random()*26),

          COLS = Math.ceil(innerWidth / FONT);
